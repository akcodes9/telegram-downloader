<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: Arial;
        padding: 16px;
        width: 220px;
        background: #1e1e1e;
        color: white;
        text-align: center;
      }

      h3 {
        margin-bottom: 15px;
        font-size: 15px;
      }

      button {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border: none;
        border-radius: 6px;
        background: #0088cc;
        color: white;
        cursor: pointer;
        font-size: 13px;
      }

      button.secondary {
        background: #444;
      }

      .small {
        font-size: 11px;
        color: #aaa;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <h3>Telegram Downloader</h3>

    <button id="signin">Sign In</button>
    <button id="register" class="secondary">Register</button>

    <div class="small">Manage account & downloads</div>

    <script src="popup.js"></script>
  </body>
</html>
