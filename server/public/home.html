<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universal Media Downloader</title>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
      body {
        background: #0b0b0b;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
      }

      h1 {
        margin-top: 40px;
      }

      .card {
        background: #1a1a1a;
        padding: 20px;
        margin: 20px auto;
        border-radius: 12px;
        width: 300px;
      }

      button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }

      .blue {
        background: #1e88e5;
      }
      .green {
        background: #2e7d32;
      }
      .red {
        background: #c62828;
      }
    </style>
  </head>

  <body>
    <h1>Universal Media Downloader</h1>
    <p>Download videos & images from Telegram, WhatsApp, Redgifs & more</p>

    <!-- Tools -->
    <div class="card">
      <h3>Tools</h3>
      <button class="blue">Telegram Downloader</button>
      <button class="blue">WhatsApp Downloader</button>
      <button class="blue">Redgifs Downloader</button>
    </div>

    <!-- Dynamic Account Section -->
    <div id="account-section"></div>

    <script>
      function getUser() {
        return JSON.parse(localStorage.getItem("user"));
      }

      function setUser(user) {
        localStorage.setItem("user", JSON.stringify(user));
      }

      function logout() {
        localStorage.removeItem("user");
        renderUI();
      }

      function login() {
        const user = {
          email: "user@example.com",
          isPremium: false,
        };

        setUser(user);
        renderUI();
      }

      async function createOrder() {
        try {
          const res = await fetch("/create-order", {
            method: "POST",
          });

          const data = await res.json();

          const options = {
            key: "rzp_live_SeGrQ7HuBV0Ypj",
            amount: data.amount,
            currency: data.currency,
            order_id: data.id,
            name: "Universal Downloader",
            description: "Premium Access",

            handler: async function (response) {
              const verifyRes = await fetch("/verify-payment", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(response),
              });

              const result = await verifyRes.json();

              if (result.success) {
                alert("Payment verified!");

                const user = getUser();
                user.isPremium = true;

                setUser(user);
                renderUI();
              } else {
                alert("Payment verification failed");
              }
            },
          };

          const rzp = new Razorpay(options);
          rzp.open();
        } catch (err) {
          console.error(err);
          alert("Payment failed");
        }
      }

      function cancelPlan() {
        const user = getUser();
        user.isPremium = false;

        setUser(user);
        renderUI();
      }

      function renderUI() {
        const user = getUser();
        const container = document.getElementById("account-section");

        if (!user) {
          container.innerHTML = `
          <div class="card">
            <h3>Account</h3>
            <button class="blue" onclick="login()">Login / Register</button>
          </div>
        `;
          return;
        }

        if (!user.isPremium) {
          container.innerHTML = `
          <div class="card">
            <h3>${user.email}</h3>
            <p>Free Plan</p>
            <button class="green" onclick="createOrder()">Upgrade ₹200</button>
            <button class="red" onclick="logout()">Logout</button>
          </div>
        `;
          return;
        }

        container.innerHTML = `
        <div class="card">
          <h3>${user.email}</h3>
          <p style="color:lightgreen;">Premium Active ✅</p>
          <button class="red" onclick="cancelPlan()">Cancel Plan</button>
          <button class="red" onclick="logout()">Logout</button>
        </div>
      `;
      }

      renderUI();
    </script>
  </body>
</html>
