<!DOCTYPE html>
<html>
  <head>
    <title>Universal Media Downloader</title>

    <style>
      body {
        font-family: Arial;
        background: #0f0f0f;
        color: white;
        text-align: center;
        padding: 50px;
      }

      h1 {
        margin-bottom: 10px;
      }

      .tagline {
        color: #aaa;
        margin-bottom: 30px;
      }

      .card {
        background: #1c1c1c;
        padding: 20px;
        border-radius: 10px;
        width: 320px;
        margin: 10px auto;
      }

      button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        border-radius: 6px;
        background: #0088cc;
        color: white;
        cursor: pointer;
      }

      .upgrade {
        background: #28a745;
      }

      .footer {
        margin-top: 40px;
        font-size: 12px;
        color: #777;
      }
    </style>
  </head>

  <body>
    <h1>Universal Media Downloader</h1>
    <div class="tagline">
      Download videos & images from Telegram, WhatsApp, Redgifs & more
    </div>

    <div class="card">
      <h3>Tools</h3>

      <button onclick="openTelegram()">Telegram Downloader</button>
      <button onclick="comingSoon()">WhatsApp Downloader</button>
      <button onclick="comingSoon()">Redgifs Downloader</button>
    </div>

    <div class="card">
      <h3>Account</h3>

      <button onclick="openAuth()">Login / Register</button>
      <button class="upgrade" onclick="upgrade()">Upgrade (₹200)</button>
    </div>

    <div class="footer">Built for personal use. Respect platform policies.</div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>
      const API = "http://localhost:3000";

      function openTelegram() {
        alert("Use the Chrome Extension for Telegram downloads");
      }

      function comingSoon() {
        alert("Coming soon");
      }

      function openAuth() {
        window.location.href = "/auth.html";
      }

      async function upgrade() {
        const userId = localStorage.getItem("userId");

        if (!userId) {
          alert("Login first");
          return;
        }

        const res = await fetch(`${API}/create-order`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId }),
        });

        const data = await res.json();

        const options = {
          key: data.key,
          amount: data.amount,
          currency: "INR",
          name: "Universal Downloader",
          order_id: data.orderId,
          handler: async function (response) {
            await fetch(`${API}/verify-payment`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                ...response,
                userId,
              }),
            });

            alert("Payment successful!");
          },
        };

        const rzp = new Razorpay(options);
        rzp.open();
      }
    </script>
  </body>
</html>
