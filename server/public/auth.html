<!DOCTYPE html>
<html>
  <head>
    <title>Auth</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: #1e293b;
        padding: 30px;
        border-radius: 12px;
        width: 320px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      h2 {
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: none;
        border-radius: 6px;
        outline: none;
        background: #334155;
        color: white;
      }

      button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }

      .primary {
        background: #3b82f6;
        color: white;
      }

      .secondary {
        background: transparent;
        color: #94a3b8;
        margin-top: 10px;
      }

      .secondary:hover {
        text-decoration: underline;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- LOGIN -->
      <div id="loginBox">
        <h2>Login</h2>
        <input id="loginEmail" placeholder="Email" />
        <input id="loginPassword" type="password" placeholder="Password" />
        <button class="primary" onclick="login()">Login</button>
        <button class="secondary" onclick="showRegister()">
          Create account
        </button>
      </div>

      <!-- REGISTER -->
      <div id="registerBox" class="hidden">
        <h2>Register</h2>
        <input id="registerEmail" placeholder="Email" />
        <input id="registerPassword" type="password" placeholder="Password" />
        <button class="primary" onclick="register()">Register</button>
        <button class="secondary" onclick="showLogin()">Back to login</button>
      </div>
    </div>

    <script>
      const API = "https://telegram-downloader-laaq.onrender.com"; // change if needed

      function showRegister() {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("registerBox").classList.remove("hidden");
      }

      function showLogin() {
        document.getElementById("registerBox").classList.add("hidden");
        document.getElementById("loginBox").classList.remove("hidden");
      }

      async function login() {
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;

        const res = await fetch(API + "/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (data.token) {
          localStorage.setItem("token", data.token);
          window.location.href = "/home.html";
        } else {
          alert("Invalid credentials");
        }
      }

      async function register() {
        const email = document.getElementById("registerEmail").value;
        const password = document.getElementById("registerPassword").value;

        const res = await fetch(API + "/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (data.message) {
          alert("Registered successfully. Please login.");
          showLogin();
        } else {
          alert("Error registering");
        }
      }
    </script>
  </body>
</html>
