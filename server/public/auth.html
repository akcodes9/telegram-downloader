<!DOCTYPE html>
<html>
  <head>
    <title>Telegram Downloader - Account</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #121212;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: #1e1e1e;
        padding: 30px;
        border-radius: 10px;
        width: 320px;
        text-align: center;
      }

      h2 {
        margin-bottom: 15px;
      }

      input {
        width: 100%;
        padding: 8px;
        margin: 8px 0;
        border-radius: 5px;
        border: none;
      }

      button {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        border: none;
        border-radius: 6px;
        background: #0088cc;
        color: white;
        cursor: pointer;
      }

      button.secondary {
        background: #444;
      }

      button:disabled {
        opacity: 0.6;
      }

      .status {
        margin-top: 12px;
        font-size: 13px;
        color: #aaa;
      }

      .success {
        color: #4caf50;
      }
      .error {
        color: #f44336;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Account</h2>

      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />

      <button id="registerBtn">Register</button>
      <button id="loginBtn" class="secondary">Login</button>

      <button id="resendBtn" style="display: none">
        Resend Verification Email
      </button>

      <div class="status" id="status"></div>
    </div>

    <script>
      const API = "https://telegram-downloader-laaq.onrender.com";
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const statusDiv = document.getElementById("status");
      const resendBtn = document.getElementById("resendBtn");

      function setStatus(msg, type = "") {
        statusDiv.innerText = msg;
        statusDiv.className = "status " + type;
      }

      function setLoading(state) {
        document.getElementById("registerBtn").disabled = state;
        document.getElementById("loginBtn").disabled = state;
      }

      // ===============================
      // REGISTER
      // ===============================
      document.getElementById("registerBtn").onclick = async () => {
        const email = emailInput.value;
        const password = passwordInput.value;

        if (!email || !password) {
          setStatus("Enter email & password", "error");
          return;
        }

        setLoading(true);
        setStatus("Creating account...");

        try {
          const res = await fetch(`${API}/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            setStatus(data.error || "Error", "error");
          } else {
            setStatus("Check your email to verify account", "success");
            resendBtn.style.display = "block";
          }
        } catch {
          setStatus("Server error", "error");
        }

        setLoading(false);
      };

      // ===============================
      // LOGIN
      // ===============================
      document.getElementById("loginBtn").onclick = async () => {
        const email = emailInput.value;
        const password = passwordInput.value;

        if (!email || !password) {
          setStatus("Enter email & password", "error");
          return;
        }

        setLoading(true);
        setStatus("Logging in...");

        try {
          const res = await fetch(`${API}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            if (data.error === "Verify your email first") {
              setStatus("Please verify your email first", "error");
              resendBtn.style.display = "block";
            } else {
              setStatus("Invalid credentials", "error");
            }
            return;
          }

          // 🔥 Send login success back to extension
          window.opener.postMessage(
            {
              type: "LOGIN_SUCCESS",
              userId: data.userId,
            },
            "*"
          );

          setStatus("Login successful!", "success");

          setTimeout(() => window.close(), 800);
        } catch {
          setStatus("Server error", "error");
        }

        setLoading(false);
      };

      // ===============================
      // RESEND VERIFICATION
      // ===============================
      resendBtn.onclick = async () => {
        const email = emailInput.value;

        if (!email) {
          setStatus("Enter email first", "error");
          return;
        }

        setStatus("Sending verification email...");

        try {
          const res = await fetch(`${API}/resend`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });

          const data = await res.json();

          setStatus(data.message || "Email sent!", "success");
        } catch {
          setStatus("Error sending email", "error");
        }
      };
    </script>
  </body>
</html>
